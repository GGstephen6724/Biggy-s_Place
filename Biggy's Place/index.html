<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sample Restaurant</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <!-- Anchor for top of page -->
  <div id="top"></div>

  <!-- Header / Nav -->
  <header class="navbar">
    <div class="logo">Biggy<span>'s</span> Place</div>
    <nav>
      <a href="#menu">Menu</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-slider">
      <div class="slide slide-1"></div>
      <div class="slide slide-2"></div>
      <div class="slide slide-3"></div>
      <div class="slide slide-4"></div>
    </div>
    <div class="hero-content">
      <h1>Welcome to Biggy's Place</h1>
      <p>Go Biggy's or Go Home!!</p>
    <div class="status-wrapper">
      <p id="hours-status" class="hours-status">Checking if we're open...</p>
    </div>
    <a href="#menu" class="cta-button">View Menu</a>
    </div>
  </section>

  <!-- (Everything else stays the same...) -->
  <!-- ... Menu, About, Contact, Footer ... -->

  <!-- Back to Top Button -->
  <button onclick="scrollToTop()" id="backToTopBtn" title="Back to Top">↑</button>

  <!-- Scripts -->
  <script>
    // Collapsible menu logic
    document.querySelectorAll('.collapsible').forEach(button => {
      button.addEventListener('click', () => {
        button.classList.toggle('active');
        const content = button.nextElementSibling;
        if (content.classList.contains('expanded')) {
          content.style.maxHeight = null;
          content.classList.remove('expanded');
        } else {
          content.classList.add('expanded');
          content.style.maxHeight = content.scrollHeight + "px";
        }
      });
    });

    // Back to top button logic
    const backToTopBtn = document.getElementById('backToTopBtn');
    window.onscroll = () => {
      if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
        backToTopBtn.style.display = "block";
      } else {
        backToTopBtn.style.display = "none";
      }
    };
    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Open/Closed Hours Logic
    const openHours = {
      0: null, // Sunday (Closed)
      1: { open: 7, close: 14 }, // Monday
      2: { open: 7, close: 14 },
      3: { open: 7, close: 14 },
      4: { open: 7, close: 14 },
      5: { open: 7, close: 14 },
      6: { open: 7, close: 13 }  // Saturday
    };
    const statusElement = document.getElementById("hours-status");
function formatHour(hour) {
  const period = hour >= 12 ? 'PM' : 'AM';
  const adjustedHour = hour % 12 === 0 ? 12 : hour % 12;
  return `${adjustedHour}:00 ${period}`;
}

function updateOpenStatus() {
  const now = new Date();
  const day = now.getDay();
  const hour = now.getHours();
  const today = openHours[day];

  if (!today) {
    statusElement.textContent = "We're closed today (Sunday)";
    statusElement.style.color = "white";
    return;
  }

  if (hour >= today.open && hour < today.close) {
    statusElement.textContent = `We're OPEN until ${formatHour(today.close)}`;
    statusElement.style.color = "#90ee90";
  } else {
    statusElement.textContent = `We're CLOSED — open ${formatHour(today.open)} to ${formatHour(today.close)}`;
    statusElement.style.color = "#ffd700";
  }
}
    updateOpenStatus();
  </script>
</body>
</html>
